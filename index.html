<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level 1</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="game-body meadow">
  <div class="hearts" id="hearts"></div>
  <main class="game-stage">
    <section class="game-panel tutorial-panel">
      <div class="hud-line">
        <span>LEVEL 1</span>
        <span>Memory Tutorial</span>
      </div>
      <div class="level-layout">
        <div class="pixel-scene meadow-scene">
          <div class="sun"></div>
          <div class="cloud c1"></div>
          <div class="cloud c2"></div>
          <div class="hero-name">ผู้เล่นมือใหม่ Lv.1</div>
          <button class="real-hero" type="button" aria-label="ตัวละครผู้เล่น">
            <span class="hero-cape"></span><span class="hero-neck"></span><span class="hero-face"></span><span class="hero-hair"></span><span class="hero-ear left"></span><span class="hero-ear right"></span><span class="hero-eye left"></span><span class="hero-eye right"></span><span class="hero-brow left"></span><span class="hero-brow right"></span><span class="hero-nose"></span><span class="hero-mouth"></span><span class="hero-blush left"></span><span class="hero-blush right"></span><span class="hero-shirt"></span><span class="hero-strap"></span><span class="hero-arm left"></span><span class="hero-arm right"></span><span class="hero-hand left"></span><span class="hero-hand right"></span><span class="hero-pants"></span><span class="hero-leg left"></span><span class="hero-leg right"></span><span class="hero-boot left"></span><span class="hero-boot right"></span><span class="hero-sword"></span><span class="hero-spark one"></span><span class="hero-spark two"></span>
          </button>
          <div class="hero-shadow"></div>
          <div class="speech-bubble">ตอบให้ถูกก่อนนะ</div>
        </div>
        <div class="game-copy">
          <p class="eyebrow">Quest 1 / วันเริ่มต้น</p>
          <h1 class="title">วันที่เริ่มคุยกันคือวันไหน?</h1>
          <p class="subtitle">จำวันเริ่มต้นของเราให้ได้ แล้วระบบจะปลดล็อกด่านถัดไป</p>
          <label class="quiz-card single-quiz" data-answer="25/04/2569|25/04/69|25/4/2569|25/4/69">
            <span>Memory Check</span>
            <strong>วันที่เริ่มคุยกัน</strong>
            <input class="quiz-input" id="levelAnswer" type="text" placeholder="">
            <small class="quiz-feedback" id="levelFeedback">ตอบให้ถูก แล้วกดเช็คคำตอบ</small>
          </label>
          <button class="game-next big-next check-quiz" id="checkAnswer" type="button">CHECK: เช็คคำตอบ</button>
          <p class="game-caption" id="missionStatus">ตอบถูกถึงจะไปหน้าต่อไปได้</p>
          <a class="game-next big-next locked" id="nextLink" href="./page2.html" aria-disabled="true">LOCKED: ผ่านด่านนี้ก่อน</a>
        </div>
      </div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
